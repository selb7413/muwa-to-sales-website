<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="refresh"
      content="0; url=https://script.google.com/macros/s/AKfycbzj2trYnGMJTDsJWXUSKieoDTzA0cqKoW0PmnPjnjc9gL1qR5auue8pM0gtuARDG8OVNw/exec"
    />
    <title>前往 MUWA 商品後台</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #252320;
        --paper: #fffaf0;
        --orange: #d8782f;
        --tan: #f0dfc3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #fbf4e8 0%, var(--tan) 100%);
        color: var(--ink);
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      }

      main {
        width: min(520px, 100%);
        padding: 28px;
        background: var(--paper);
        border: 4px solid var(--ink);
        border-radius: 14px;
        box-shadow: 8px 8px 0 var(--ink);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 18px;
        color: #635e56;
        font-weight: 700;
        line-height: 1.7;
      }

      a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        background: var(--orange);
        border: 3px solid var(--ink);
        border-radius: 8px;
        box-shadow: 5px 5px 0 var(--ink);
        color: #fff;
        font-weight: 950;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>前往 MUWA 商品後台</h1>
      <p>正在帶你到正式商品管理後台。如果沒有自動跳轉，請按下面按鈕。</p>
      <a href="https://script.google.com/macros/s/AKfycbzj2trYnGMJTDsJWXUSKieoDTzA0cqKoW0PmnPjnjc9gL1qR5auue8pM0gtuARDG8OVNw/exec">打開商品後台</a>
    </main>
    <script>
      window.location.replace("https://script.google.com/macros/s/AKfycbzj2trYnGMJTDsJWXUSKieoDTzA0cqKoW0PmnPjnjc9gL1qR5auue8pM0gtuARDG8OVNw/exec");
    </script>
  </body>
</html>
